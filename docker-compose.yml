# Production stack: API + composite worker + two static SPAs (dashboard, camera).
# Copy .env.example to .env and set strong values first.
#
# NOTE: run this behind HTTPS in production (cookies are Secure by default).
# For a quick local HTTP try-out, set COOKIE_SECURE=false in .env.

services:
  # One image (with the npm-bundled ffmpeg) is built once here and reused by
  # the worker — there is no separate ffmpeg container.
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: practiceroom-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: file:/data/app.db
      STORAGE_DIR: /data/storage
      CORS_ORIGIN: ${CORS_ORIGIN}
      SIGNING_SECRET: ${SIGNING_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      FFMPEG_PATH: ''
    volumes:
      - appdata:/data

  worker:
    image: practiceroom-app
    restart: unless-stopped
    command: ['node', 'server/dist/worker/index.js']
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/app.db
      STORAGE_DIR: /data/storage
      SIGNING_SECRET: ${SIGNING_SECRET}
      FFMPEG_PATH: ''
    volumes:
      - appdata:/data
    depends_on:
      - server

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - server

  camera:
    build:
      context: .
      dockerfile: camera/Dockerfile
    restart: unless-stopped
    ports:
      - '8081:80'
    depends_on:
      - server

volumes:
  appdata:
