# Production stack: API + composite worker + two static SPAs (dashboard, camera).
# Copy .env.example to .env and set strong values first.
#
# NOTE: run this behind HTTPS in production (cookies are Secure by default).
# For a quick local HTTP try-out, set COOKIE_SECURE=false in .env.

services:
  # One image (with the npm-bundled ffmpeg) is built once here and reused by
  # the worker — there is no separate ffmpeg container.
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: practiceroom-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: file:/data/app.db
      STORAGE_DIR: /data/storage
      CORS_ORIGIN: ${CORS_ORIGIN}
      SIGNING_SECRET: ${SIGNING_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      # The API is only reachable through the nginx services (one hop), so trust
      # exactly that hop to read the real client IP from X-Forwarded-For.
      TRUST_PROXY: ${TRUST_PROXY:-1}
      # Cap per recording segment / library upload (MB) to bound disk usage.
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-1024}
      FFMPEG_PATH: ''
    volumes:
      - appdata:/data

  worker:
    image: practiceroom-app
    restart: unless-stopped
    command: ['node', 'server/dist/worker/index.js']
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/app.db
      STORAGE_DIR: /data/storage
      SIGNING_SECRET: ${SIGNING_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FFMPEG_PATH: ''
    volumes:
      - appdata:/data
    depends_on:
      - server

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - server

  camera:
    build:
      context: .
      dockerfile: camera/Dockerfile
    restart: unless-stopped
    ports:
      - '8081:80'
    depends_on:
      - server

  # Optional: the headless Pi camera agent, for testing without hardware. It
  # runs synthetic test cameras (PR_AGENT_FAKE) and is only started with the
  # "agent" profile:  docker compose --profile agent up -d --build
  # Then open http://localhost:8088 and set the server URL to http://server:3000.
  agent:
    build:
      context: ./pi-agent
    profiles: ['agent']
    restart: unless-stopped
    ports:
      - '8088:8088'
    environment:
      PR_AGENT_FAKE: '2' # expose two synthetic test cameras
    volumes:
      - agentdata:/root/.practiceroom-agent
    depends_on:
      - server

volumes:
  appdata:
  agentdata:
